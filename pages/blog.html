---
layout: page
pagination:
  enabled: true
permalink: /blog/
title: Blog
---

<div class="posts">
  {% for post in paginator.posts %}
  <article class="post">

    <h2>
      <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
    </h2>
    <div class="date">
      {{ post.date | date: "%B %e, %Y" }}
    </div>

    <div class="entry">
      {{ post.excerpt }}
    </div>

    <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
  </article>
  {% endfor %}
</div>
