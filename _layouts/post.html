---
layout: default
---

<article class="post">
  {% if page.image %}
  <figure class="post-hero">
    <img src="{{ site.baseurl }}/images/{{ page.image }}"
         alt="{{ page.image_alt | default: page.title }}" />
  </figure>
  {% endif %}

  <h1>{{ page.title }}</h1>

  {% include post-taxonomy.html post=page %}
  {% github_edit_link "Edit on GitHub" %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include post-taxonomy.html post=page %}
  {% include twitter.html %}
</article>
